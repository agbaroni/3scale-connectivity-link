apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: 3scale-persistence
  name: zync-database
spec:
  selector:
    matchLabels:
      app: zync-database
  replicas: 1
  template:
    metadata:
      labels:
        app: zync-database
    spec:
      containers:
        - name: container
          image: registry.redhat.io/rhel10/postgresql-16:10.2
          env:
            - name: POSTGRESQL_USER
              value: zync
            - name: POSTGRESQL_PASSWORD
              value: password
            - name: POSTGRESQL_DATABASE
              value: zync
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/pgsql/data
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zync-database
