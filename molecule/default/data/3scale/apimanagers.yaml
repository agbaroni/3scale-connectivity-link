# 2) oc run bootstrap-3scale-db --namespace=3scale --restart=Never --image=registry.redhat.io/3scale-amp2/system-rhel9:3scale2.16 --env="DATABASE_URL=mysql2://system:password@system-database.3scale-persistence.svc.cluster.local:3306/system" --env="REDIS_URL=redis://backend-queues-redis.3scale-persistence.svc.cluster.local:6379/0" --env="SYSTEM_REDIS_URL=redis://system-redis.3scale-persistence.svc.cluster.local:6379/0" --env="RAILS_ENV=production" -- /bin/bash -c "bundle exec rake db:seed"
apiVersion: apps.3scale.net/v1alpha1
kind: APIManager
metadata:
  name: test
  namespace: 3scale
spec:
  apicast:
    stagingSpec:
      customEnvironments:
        - secretRef:
            name: apicast-staging-custom-environment
      logLevel: debug
  externalComponents:
    backend:
      redis: true
    system:
      redis: true
      database: true
    zync:
      database: true
  resourceRequirementsEnabled: false
  system:
    fileStorage:
      persistentVolumeClaim:
        storageClassName: ocs-external-storagecluster-cephfs
  wildcardDomain: apps.cluster-jsn9w.dynamic2.redhatworkshops.io
