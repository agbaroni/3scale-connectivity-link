---
apiVersion: v1
kind: Pod
metadata:
  name: bootstrap-3scale-db
  namespace: 3scale
spec:
  containers:
  - name: db-initializer
    # Usiamo l'immagine ufficiale di system che contiene già Ruby, Rake e le gemme di 3scale
    image: registry.redhat.io/3scale-amp2/system-rhel9:3scale2.16
    command: ["/bin/bash", "-c"]
    args:
      - |
        echo "Attendiamo che il database sia raggiungibile..."
        until bundle exec rake db:version &> /dev/null; do
          echo "Database non pronto o tabelle assenti, avvio inizializzazione..."
          bundle exec rake db:schema:load && bundle exec rake db:seed
          break
        done
        echo "Schema iniettato con successo!"
    env:
    # Iniettiamo la stringa di connessione prelevandola dal tuo secret esistente
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: system-database
          key: URL
    # Configurazione adatta all'ambiente Rails di 3scale
    - name: RAILS_ENV
      value: production
  restartPolicy: Never