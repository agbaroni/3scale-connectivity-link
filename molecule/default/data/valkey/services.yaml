---
apiVersion: v1
kind: Service
metadata:
  name: system-redis
  namespace: 3scale-persistence
spec:
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  selector:
    app: system-redis
---
apiVersion: v1
kind: Service
metadata:
  name: backend-storage-redis
  namespace: 3scale-persistence
spec:
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  selector:
    app: backend-storage-redis
---
apiVersion: v1
kind: Service
metadata:
  name: backend-queues-redis
  namespace: 3scale-persistence
spec:
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  selector:
    app: backend-queues-redis