---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: system-redis
  namespace: 3scale-persistence
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi
  storageClassName: ocs-external-storagecluster-ceph-rbd
  volumeMode: Filesystem
