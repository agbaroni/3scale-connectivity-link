---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: 3scale-persistence
  name: system-redis
spec:
  selector:
    matchLabels:
      app: system-redis
  replicas: 1
  template:
    metadata:
      labels:
        app: system-redis
    spec:
      containers:
        - name: container
          image: registry.redhat.io/rhel10/valkey-8:10.2
          ports:
            - containerPort: 6379
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/valkey/data
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: system-redis
