#   ansible.builtin.set_fact:
#     oidc_issuer: null
#   when: output_proxy.json.proxy.oidc_issuer_endpoint is not defined

- name: Combine with other Usages
  ansible.builtin.set_fact:
    objects: >-
      {{ objects | combine({
        service_id: {
          'credentials': {
            'oidc_issuer': output_proxy.json.proxy.oidc_issuer_endpoint | regex_replace('(https?://)([^@]+@)', '\1')
          }
        }}, recursive=True)
      }}
  when: output_proxy.json.proxy.oidc_issuer_endpoint is defined

- name: Combine with other Usages
  ansible.builtin.set_fact:
    objects: >-
      {{ objects | combine({
        service_id: {
          'credentials': {
            'oidc_issuer': none
          }
        }}, recursive=True)
      }}
  when: output_proxy.json.proxy.oidc_issuer_endpoint is not defined
